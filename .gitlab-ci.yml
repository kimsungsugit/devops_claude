stages:
  - lint
  - test
  - frontend

variables:
  # TODO: 자체 서명 인증서 CA를 runner에 등록 후 제거 (MITM 위험)
  GIT_SSL_NO_VERIFY: "1"
  PYTHONPATH: "$CI_PROJECT_DIR"

# Python syntax check on changed .py files
syntax-check:
  stage: lint
  tags:
    - shared
  script:
    - echo "=== Python Syntax Check ==="
    - $changedFiles = git diff --name-only HEAD~1..HEAD -- "*.py" 2>$null
    - |
      if ($changedFiles) {
        $fail = $false
        foreach ($f in $changedFiles -split "`n") {
          if ($f -and (Test-Path $f)) {
            Write-Host "Checking: $f"
            python -m py_compile $f
            if ($LASTEXITCODE -ne 0) { $fail = $true }
          }
        }
        if ($fail) {
          Write-Host "Syntax errors found!"
          exit 1
        }
        Write-Host "All syntax checks passed"
      } else {
        Write-Host "No Python files changed, skipping"
      }
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Unit tests
unit-tests:
  stage: test
  tags:
    - shared
  before_script:
    - '[Environment]::SetEnvironmentVariable("PYTHONPATH", "$PWD", "Process")'
    - python -m pip install --no-build-isolation -r requirements-dev.txt 2>$null; $true
    - python -m pip install --no-build-isolation -r requirements-core.txt 2>$null; $true
  script:
    - '[Environment]::SetEnvironmentVariable("PYTHONPATH", "$PWD", "Process")'
    - echo "=== Running Unit Tests ==="
    - python -m pip install --no-build-isolation pytest-cov 2>$null; $true
    - python -m pytest tests/unit/ -q --tb=short --cov=backend --cov=workflow --cov=report_gen --cov=generators --cov-report=term --cov-fail-under=25
  timeout: 15m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: false

# Frontend tests
frontend-tests:
  stage: frontend
  tags:
    - shared
  script:
    - cd frontend-v2
    - npm ci
    - npm test
  timeout: 10m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: false
